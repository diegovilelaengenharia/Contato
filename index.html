<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vilela Engenharia | Links oficiais</title>
    <meta name="description"
        content="Acesse contatos, serviços, portfólio e materiais oficiais da Vilela Engenharia e do engenheiro Diego Tarcisio Nunes Vilela.">
    <meta name="robots" content="index,follow">
    <link rel="canonical" href="https://www.vilela.eng.br/contato/">
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/logo.jpg">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#197e63">

    <!-- Open Graph / Twitter Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.vilela.eng.br/contato/">
    <meta property="og:title" content="Vilela Engenharia | Links oficiais">
    <meta property="og:description"
        content="Engenharia Civil com confiança e qualidade. Contatos, serviços, portfólio e materiais do engenheiro Diego Tarcisio Nunes Vilela.">
    <meta property="og:image" content="https://www.vilela.eng.br/contato/assets/logo.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Vilela Engenharia | Links oficiais">
    <meta name="twitter:description"
        content="Engenharia Civil com confiança e qualidade. Contatos, serviços, portfólio e materiais do engenheiro Diego Tarcisio Nunes Vilela.">
    <meta name="twitter:image" content="https://www.vilela.eng.br/contato/assets/logo.jpg">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page">
        <header class="hero" role="banner">
            <div class="hero-top">
                <a class="client-area-button" href="https://vilela.eng.br/portal" target="_blank" rel="noopener">Área do
                    Cliente</a>
            </div>
            <picture class="logo">
                <!-- Imagem preenchida via JS -->
                <img src="assets/logo.jpg" alt="Logotipo da Vilela Engenharia" width="160" height="160" loading="lazy"
                    decoding="async">
            </picture>
            <div class="heading">
                <span class="badge">Engenheiro Civil</span>
                <h1>Vilela Engenharia</h1>
                <p class="hero-name">Diego Tarcisio Nunes Vilela</p>
                <p class="hero-role">Engenheiro Civil &middot; CREA 235.474/D</p>
            </div>
            <div class="hero-actions">
                <!-- Preenchido via JS -->
            </div>
        </header>
        <main id="conteudo-principal" class="content" aria-label="Conteúdo principal">
            <section id="acesso-rapido" class="links" aria-label="Opções principais">
                <h2 class="section-heading">Acesso rápido</h2>
                <!-- Lista vazia preenchida por JS -->
                <ul class="links-grid" id="links-list"></ul>
            </section>
        </main>
        <footer class="footer">
            <small>&copy; <span id="year">2025</span> Vilela Engenharia. Todos os direitos reservados.</small>
        </footer>
    </div>

    <!-- Scripts do App (Module) -->
    <script type="module" src="assets/js/app.js"></script>

    <!-- Script Service Worker -->
    <script>
        (function () {
            const yearSpan = document.getElementById('year');
            if (yearSpan) {
                yearSpan.textContent = new Date().getFullYear();
            }

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('service-worker.js').catch(() => { });
                });
            }
        }());
    </script>
</body>

</html>
